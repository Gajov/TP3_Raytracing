    <style>
        body {
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            font-family: "Satisfy", cursive;
        }
        
        h1.navbar-brand {
            font-size: 36px;
            color: #333;
        }
        
        h1.navbar-brand strong {
            color: hotpink;
        }
        
        #alunos {
            color: cornflowerblue;
        }
        
        .card {
            position: relative;
            min-width: 300px;
            box-sizing: border-box;
        }
        
        .card .diff {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
        }
        
        .card:hover .diff {
            opacity: 1;
        }
        
        .card:nth-of-type(2) {
            cursor: crosshair;
        }
        
        .tooltip-icon {
            fill: #6c757d;
            cursor: help;
            margin-left: 0.25em;
        }
        
        .items {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
    </style>

    <script type="module">
        import hjson from 'https://cdn.jsdelivr.net/npm/hjson@3.2.2/+esm'
        import pixelmatch from 'https://cdn.jsdelivr.net/npm/pixelmatch@7.2.0/+esm'

        function mostraErro(mensagem) {
            const $toast = $('.toast')
            $toast.find('.toast-icon').html('⚠️');
            $toast.find('.toast-title').html('Erro');
            $toast.find('.toast-body').html(mensagem);
            $toast.toast('show');
        }

        function erroNoJson(erro) {
            mostraErro('Houve um erro ao carregar o arquivo <code>autores.json</code>: <pre style="white-space: pre-wrap">' + erro + '</pre>');
        }
        
        function erroDesconhecido(erro) {
            mostraErro('Houve um erro desconhecido: <pre style="white-space: pre-wrap">' + erro + '</pre>');
        }
        
        function erroDeCanvas(erro) {
            mostraErro(`Houve um erro ao mostrar a imagem "${erro.imgSrc}": <pre style="white-space: pre-wrap">${erro}</pre>`);
        }

        function imagemParaCanvas($el) {
            const canvasEl = document.createElement('canvas');
            canvasEl.classList.add('card-img-top');
            canvasEl.width = $el.width();
            canvasEl.height = $el.height();
            const ctx = canvasEl.getContext('2d');
            try {
                ctx.drawImage($el[0], 0, 0, $el.width(), $el.height());
                $el.replaceWith(canvasEl);
            } catch (erro) {
                const src = $el[0].src;
                erro.imgSrc = src.substr(src.lastIndexOf('/') + 1)
                throw erro;
            }

            return { canvasEl, ctx };
        }

        function montarPagina(resposta) {
            $('#alunos').html(resposta.autores.join(' <span style="color: #333">e</span> '));
            $('#linguagem').html(resposta.linguagem);
            $('#esfera').prop('checked', resposta.implementacoes.colisoes.esfera);
            $('#plano').prop('checked', resposta.implementacoes.colisoes.plano);
            $('#circulo').prop('checked', resposta.implementacoes.colisoes.circulo);
            $('#triangulo').prop('checked', resposta.implementacoes.colisoes.triangulo);
            $('#cilindro').prop('checked', resposta.implementacoes.colisoes.cilindro);
            $('#phong').prop('checked', resposta.implementacoes.sombreamento.phong);
            $('#reflexao').prop('checked', resposta.implementacoes.sombreamento.reflexao);
            $('#refracao').prop('checked', resposta.implementacoes.sombreamento.refracao);
            $('#distribuido').prop('checked', resposta.implementacoes.sombreamento.distribuido);

            const erros = [];
            $('.card-deck').each((i, el) => {
                try {
                    const $imagemDoAluno = $(el).find('.card').first().find('img');
                    const $imagemDoObjetivo = $(el).find('.card').last().find('img');
                    const largura = Math.floor($imagemDoObjetivo.width());
                    const altura = Math.floor($imagemDoObjetivo.height());
                    const canvasDoAluno = imagemParaCanvas($imagemDoAluno);
                    const canvasDoObjetivo = imagemParaCanvas($imagemDoObjetivo);
                    const canvasDoDiff = document.createElement('canvas');
                    canvasDoDiff.width = largura;
                    canvasDoDiff.height = altura;
                    canvasDoDiff.classList.add('card-img-top');
                    canvasDoDiff.classList.add('diff');
                    const diffCtx = canvasDoDiff.getContext('2d');
                    const diff = diffCtx.createImageData(largura, altura);
        
                    const pixelsDiferentes = pixelmatch(
                        canvasDoAluno.ctx.getImageData(0, 0, largura, altura).data,
                        canvasDoObjetivo.ctx.getImageData(0, 0, largura, altura).data,
                        diff.data,
                        largura, altura,
                        { 
                            threshold: 0.15
                        }
                    );
        
                    diffCtx.putImageData(diff, 0, 0);
                    $(el).find('.card').last().prepend(canvasDoDiff);
                    const porcentagemDiferenca = (100 * pixelsDiferentes / (largura * altura));
        
                    $(el).find('.card').last().find('.diff-pixels')
                        .addClass('float-right')
                        .html(`<span>${porcentagemDiferenca.toFixed(2)}%</span> pixels diferentes`)
                        .find('span')
                        .addClass(porcentagemDiferenca < 0.05 ? 'text-primary' : 'text-danger')
                } catch (erro) {
                    erros.push(erro);
                }
            });

            if (erros.length > 0) {
                erros.forEach(erro => erro.name === 'InvalidStateError' ? erroDeCanvas(erro) : erroDesconhecido(erro));
            }

            
            return Promise.resolve();
        }
        
        // inicia toasts e tootlips
        $('.toast').toast({ autohide: false, delay: 6000 });
        $('[data-toggle="tooltip"]').tooltip()

        fetch('./autores.hjson')
            .then(r => r.text())
            .then(r => hjson.parse(r), erroNoJson)
            .then(montarPagina, erroDesconhecido)
                .catch(erroDesconhecido)
    </script>
